<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../estilos/style.css">
</head>
    <body 
    class="min-h-screen flex items-center justify-center p-4">
    <div id="toast-container"></div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        
        
        <div id="view-login" class="view-section active flex-col p-8">
            <div class="text-center mb-8">
                <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="user" class="text-indigo-600 w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Login das Guerreiras Caxienses</h2>
            </div>
            <form id="form-login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">CPF</label>
                    <input type="text" id="login-username" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-gray-700">Senha</label>
                        <a href="#" onclick="switchView('view-forgot-password')" class="text-xs text-indigo-600">Esqueci a senha</a>
                    </div>
                    <input type="password" id="login-password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg">Entrar</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">Não tem conta? <a href="pages/cadastro.html" class="text-indigo-600 font-semibold">Registre-se</a></p>
            </div>
        </div>

        <div id="view-forgot-password" class="view-section flex-col p-8">
            <h2 class="text-2xl font-bold text-center mb-6">Recuperar Senha</h2>
            <form id="form-forgot-password" class="space-y-4">
                <input type="email" id="forgot-email" required class="w-full px-4 py-2 border rounded-lg" placeholder="E-mail">
                <button type="submit" class="w-full bg-amber-500 text-white py-2.5 rounded-lg">Enviar código</button>
            </form>
            <button onclick="switchView('view-login')" class="mt-4 text-sm text-gray-500 w-full text-center">Voltar</button>
        </div>

        <div id="view-reset-password" class="view-section flex-col p-8">
            <h2 class="text-2xl font-bold text-center mb-6">Nova Senha</h2>
            <form id="form-reset-password" class="space-y-4">
                <input type="text" id="reset-code" required placeholder="Código 000000" class="w-full px-4 py-2 border rounded-lg text-center tracking-widest">
                <input type="password" id="reset-new-password" required placeholder="Nova palavra-passe" class="w-full px-4 py-2 border rounded-lg">
                <input type="password" id="reset-confirm-password" required placeholder="Confirmar palavra-passe" class="w-full px-4 py-2 border rounded-lg">
                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg">Redefinir</button>
            </form>
        </div>

    </div>
    <script src="../main.js"></script>
    </body>
</html>
