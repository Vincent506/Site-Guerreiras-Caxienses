<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="toast-container"></div>

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- ECRÃ: REGISTO -->
        <div id="view-register" class="view-section active flex-col p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Criar Conta</h2>
            </div>
            <form id="form-register" class="space-y-4">
                <input type="text" id="reg-fullname" required class="w-full px-4 py-2 border rounded-lg" placeholder="Nome Completo">
                <input type="text" id="reg-username" required class="w-full px-4 py-2 border rounded-lg" placeholder="Utilizador">
                <input type="email" id="reg-email" required class="w-full px-4 py-2 border rounded-lg" placeholder="E-mail">
                <input type="password" id="reg-password" required class="w-full px-4 py-2 border rounded-lg" placeholder="Palavra-passe">
                <input type="password" id="reg-confirm-password" required class="w-full px-4 py-2 border rounded-lg" placeholder="Confirmar Palavra-passe">
                <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg mt-4">Registar</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">Já tem conta? <a href="../index.html" class="text-indigo-600 font-semibold">Iniciar sessão</a></p>
            </div>
        </div>

        <!-- ECRÃ: VERIFICAÇÃO -->
        <div id="view-verify" class="view-section flex-col p-8">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold">Verifique o seu e-mail</h2>
                <p class="text-sm mt-2"><strong id="verify-email-display"></strong></p>
            </div>
            <form id="form-verify" class="space-y-4">
                <input type="text" id="verify-code" required class="w-full px-4 py-3 text-center text-2xl tracking-[0.5em] font-mono border rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg">Confirmar Código</button>
            </form>
            <button onclick="resendVerificationCode()" class="w-full mt-4 text-sm text-gray-500">Reenviar código</button>
        </div>

    </div>
    <script src="../main.js"></script>
</body>
</html>
