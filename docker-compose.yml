version: '3.8'

services:
  app:
    build: ./app
    container_name: node_app
    ports:
      - "3000:3000" # Expõe a 3000 apenas para a rede interna do Docker (o Nginx vai acessar)

  # 2. Serviço do Servidor Web Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80" # Nginx disponibiliza a aplicação na porta 8080 para a sua máquina
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf # Injeta a nossa configuração
    depends_on:
      - app # Garante que o Nginx só inicie depois do Node.js
  
